<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estudios | Contabilidad y Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #a0a0a0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .course-item { cursor: pointer; transition: all 0.3s ease; border-left: 0px solid transparent; }
        .course-item:hover { background: rgba(59, 130, 246, 0.1); color: #fff; border-left: 4px solid #3b82f6; padding-left: 1.25rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        /* Filtro especial para que el calendario de Google se vea oscuro */
        .dark-calendar { 
            filter: invert(92%) hue-rotate(180deg) brightness(0.6) contrast(1.2); 
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-400">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#050505]/80 z-50 backdrop-blur-md">
        <div>
            <h1 class="text-xs font-black tracking-[0.3em] text-white uppercase">SISTEMA DE GESTIÓN ACADÉMICA</h1>
            <p class="text-[10px] text-gray-500 font-mono mt-1 uppercase tracking-tighter">Estudiante de Contabilidad | Lima, Perú</p>
        </div>
        <div class="text-right">
            <div id="reloj" class="text-2xl font-light text-white tracking-tighter leading-none">00:00:00</div>
            <div id="fecha" class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mt-1">---</div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
        
        <div class="lg:col-span-3 space-y-6">
            <section class="glass p-5 rounded-3xl border border-white/5">
                <h2 class="text-[10px] font-black mb-6 text-blue-400 uppercase tracking-[0.2em]">Cursos Ciclo Actual</h2>
                <div class="space-y-2 overflow-y-auto max-h-[70vh] pr-2">
                    <div class="course-item p-4 rounded-xl text-xs">
